# CI for performance benchmarking
# Domains of interest:
# * startup speed (== to parse and load all rules)
# * network filter matching (== the avg time to check a request)
# * first request matching delay (== time to check the first request)
# * memory usage after loading rules and after a few requests
name: Performance CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: write
  pages: write
  pull-requests: write

jobs:
  benchmark:
    name: Performance benchmarking
    runs-on: ubuntu-latest-4-cores-public

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run benchmarks
        run: |
          ./.github/scripts/run-benchmarks.sh | tee -a output.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1.21.0
        with:
          name: Rust Benchmark
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '110%' # fails on +10% regression
          comment-on-alert: true
          fail-on-alert: true
          comment-always: true
          # Upload results only for master
          auto-push: ${{ github.ref == 'refs/heads/master' }}
